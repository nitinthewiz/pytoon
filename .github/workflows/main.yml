name: Build animation

on:
  # push:
  #   branches:
  #     - self-hosted-runner
  workflow_dispatch:
    inputs:
      audio_input:
        description: 'The audio file name to use'
        required: false
        default: 'speech.mp3'
      news_b64:
        description: 'Base64-encoded JSON array of news items with images'
        required: false
        default: ''
      speech_b64:
        description: 'Base64-encoded speech text with [ITEM] delimiters'
        required: false
        default: ''
      captions_b64:
        description: 'Base64-encoded word timestamps JSON from Kokoro TTS'
        required: false
        default: ''
      emotions_b64:
        description: 'Base64-encoded JSON array of emotion strings, one per story'
        required: false
        default: ''

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install pytoon from local source
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install --upgrade pip
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install -e .

    - name: Install moviepy and audioop
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install moviepy==1.0.3 audioop-lts==0.2.1 num2words opencv-python>=4.10.0.84

    - name: Install dependencies
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m nltk.downloader punkt averaged_perceptron_tagger averaged_perceptron_tagger_eng cmudict words

    - name: Authenticate MinIO client
      if: ${{ !startsWith(inputs.audio_input, 'speech.mp3') }}
      run: |
        ${{ secrets.MINIO_MC_PATH }}\mc alias set myminio ${{ secrets.MINIO_ENDPOINT }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }} --insecure

    - name: Download audio_input using MinIO mc
      if: ${{ !startsWith(inputs.audio_input, 'speech.mp3') }}
      run: |
        ${{ secrets.MINIO_MC_PATH }}\mc get myminio/${{ secrets.MINIO_BUCKET_NAME }}/${{ inputs.audio_input }} ./speech.mp3

    - name: Decode news JSON
      if: ${{ inputs.news_b64 != '' }}
      shell: pwsh
      env:
        NEWS_B64: ${{ inputs.news_b64 }}
      run: |
        $bytes = [System.Convert]::FromBase64String($env:NEWS_B64)
        [System.IO.File]::WriteAllBytes((Join-Path $PWD 'news.json'), $bytes)

    - name: Decode speech text
      if: ${{ inputs.speech_b64 != '' }}
      shell: pwsh
      env:
        SPEECH_B64: ${{ inputs.speech_b64 }}
      run: |
        $bytes = [System.Convert]::FromBase64String($env:SPEECH_B64)
        [System.IO.File]::WriteAllBytes((Join-Path $PWD 'speech.txt'), $bytes)

    - name: Decode captions timestamps
      if: ${{ inputs.captions_b64 != '' }}
      shell: pwsh
      env:
        CAPTIONS_B64: ${{ inputs.captions_b64 }}
      run: |
        $bytes = [System.Convert]::FromBase64String($env:CAPTIONS_B64)
        [System.IO.File]::WriteAllBytes((Join-Path $PWD 'captions.json'), $bytes)

    - name: Decode emotions
      if: ${{ inputs.emotions_b64 != '' }}
      shell: pwsh
      env:
        EMOTIONS_B64: ${{ inputs.emotions_b64 }}
      run: |
        $bytes = [System.Convert]::FromBase64String($env:EMOTIONS_B64)
        [System.IO.File]::WriteAllBytes((Join-Path $PWD 'emotions.json'), $bytes)

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache Remotion Chrome Headless Shell
      uses: actions/cache@v4
      with:
        path: ~\.cache\puppeteer
        key: remotion-chrome-${{ hashFiles('remotion/package-lock.json') }}

    - name: Cache Remotion node_modules
      id: cache-remotion
      uses: actions/cache@v4
      with:
        path: remotion/node_modules
        key: remotion-${{ hashFiles('remotion/package-lock.json') }}

    - name: Install Remotion dependencies
      if: steps.cache-remotion.outputs.cache-hit != 'true'
      run: npm ci
      working-directory: remotion

    - name: Ensure Remotion browser
      run: npx remotion browser ensure
      working-directory: remotion

    - name: Build background video
      if: ${{ inputs.news_b64 != '' }}
      run: node build_background.js

    - name: Run pytoon
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" main.py

    - name: Composite captions overlay onto animation
      if: ${{ inputs.news_b64 != '' }}
      shell: pwsh
      run: |
        if (Test-Path captions_overlay.mp4) {
          ffmpeg -i animation.mp4 -i captions_overlay.mp4 -filter_complex "[1:v]fps=48,colorkey=color=0x00FF00:similarity=0.4:blend=0.1[cap];[0:v][cap]overlay=0:0[out]" -map "[out]" -map 0:a -c:v libx264 -preset fast -crf 22 -c:a copy final.mp4
          Move-Item -Force final.mp4 animation.mp4
        } else {
          Write-Host "captions_overlay.mp4 not found (build_background.js returned early) — skipping caption composite"
        }

    - name: Upload animation to github actions results
      uses: actions/upload-artifact@v4
      with:
        name: animation.mp4
        path: animation.mp4

    - name: Upload background video for fallback re-use
      if: ${{ inputs.news_b64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: background_video.mp4
        path: background_video.mp4

    - name: Upload video file to telegram using xireiki/channel-post@v1
      if: ${{ success() }}
      uses: xireiki/channel-post@v1
      with:
        bot_token: ${{ secrets.TELEGRAM_AM_NEW_MEDIA_BOT_TOKEN }}
        chat_id: ${{ secrets.TELEGRAM_AUTOMEDIA_NEW_VIDEOS_CHAT_ID }}
        path: animation.mp4
        method: sendVideo

name: Build animation

on:
  # push:
  #   branches:
  #     - self-hosted-runner
  workflow_dispatch:
    inputs:
      audio_input:
        description: 'The audio file name to use'
        required: false
        default: 'speech.mp3'
      # v2 contract: ONE manifest replaces the per-field b64 inputs. JSON shape:
      # { version, production, edition:{country,edition,date,tz}, channels:{...},
      #   callback_url, video_key, news:[5 selected items], speech, captions,
      #   emotions, takes, teasers, tags, visuals }
      # [ITEM:N] markers in speech are 1-based indices into manifest.news.
      manifest_b64:
        description: 'Base64 JSON manifest with all show data (v2 contract)'
        required: false
        default: ''

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install pytoon from local source
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install --upgrade pip
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install -e .

    - name: Install moviepy and audioop
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m pip install moviepy==1.0.3 audioop-lts==0.2.1 num2words opencv-python>=4.10.0.84

    - name: Install dependencies
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" -m nltk.downloader punkt averaged_perceptron_tagger averaged_perceptron_tagger_eng cmudict words

    - name: Authenticate MinIO client
      if: ${{ !startsWith(inputs.audio_input, 'speech.mp3') }}
      run: |
        ${{ secrets.MINIO_MC_PATH }}\mc alias set myminio ${{ secrets.MINIO_ENDPOINT }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }} --insecure

    - name: Download audio_input using MinIO mc
      if: ${{ !startsWith(inputs.audio_input, 'speech.mp3') }}
      run: |
        ${{ secrets.MINIO_MC_PATH }}\mc get myminio/${{ secrets.MINIO_BUCKET_NAME }}/${{ inputs.audio_input }} ./speech.mp3

    - name: Decode manifest (v2 contract — writes all per-field files)
      if: ${{ inputs.manifest_b64 != '' }}
      shell: pwsh
      env:
        MANIFEST_B64: ${{ inputs.manifest_b64 }}
      run: |
        $json = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($env:MANIFEST_B64))
        [System.IO.File]::WriteAllText((Join-Path $PWD 'manifest.json'), $json)
        $m = $json | ConvertFrom-Json
        # Write the individual files the renderer scripts consume.
        # NOTE: -Depth 64 matters — ConvertTo-Json default depth (2) silently truncates.
        if ($m.news)     { $m.news     | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'news.json' }
        if ($m.speech)   { $m.speech   | Set-Content -Encoding UTF8 'speech.txt' }
        if ($m.captions) { $m.captions | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'captions.json' }
        if ($m.emotions) { $m.emotions | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'emotions.json' }
        if ($m.takes)    { $m.takes    | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'takes.json' }
        if ($m.teasers)  { $m.teasers  | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'teasers.json' }
        if ($m.tags)     { $m.tags     | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'tags.json' }
        if ($m.visuals)  { $m.visuals  | ConvertTo-Json -Depth 64 -Compress | Set-Content -Encoding UTF8 'visuals.json' }
        Write-Host "Manifest decoded: $($m.production) / $($m.edition.country)-$($m.edition.edition), $($m.news.Count) stories"

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Cache Remotion Chrome Headless Shell
      uses: actions/cache@v4
      with:
        path: ~\.cache\puppeteer
        key: remotion-chrome-${{ hashFiles('remotion/package-lock.json') }}

    - name: Cache Remotion node_modules
      id: cache-remotion
      uses: actions/cache@v4
      with:
        path: remotion/node_modules
        key: remotion-${{ hashFiles('remotion/package-lock.json') }}

    - name: Install Remotion dependencies
      if: steps.cache-remotion.outputs.cache-hit != 'true'
      run: npm ci
      working-directory: remotion

    - name: Ensure Remotion browser
      run: npx remotion browser ensure
      working-directory: remotion

    - name: Build background video
      if: ${{ inputs.manifest_b64 != '' }}
      run: node build_background.js

    - name: Run pytoon
      run: |
        & "E:\actions-runner\_work\_tool\Python\3.13.5\x64\python.exe" main.py

    - name: Composite final video (background + avatar + captions + audio)
      run: node compose.js

    - name: Upload animation to github actions results
      uses: actions/upload-artifact@v4
      with:
        name: animation.mp4
        path: animation.mp4

    - name: Upload background video for fallback re-use
      if: ${{ inputs.manifest_b64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: background_video.mp4
        path: background_video.mp4

    - name: Upload video file to telegram using xireiki/channel-post@v1
      if: ${{ success() }}
      uses: xireiki/channel-post@v1
      with:
        bot_token: ${{ secrets.TELEGRAM_AM_NEW_MEDIA_BOT_TOKEN }}
        chat_id: ${{ secrets.TELEGRAM_AUTOMEDIA_NEW_VIDEOS_CHAT_ID }}
        path: animation.mp4
        method: sendVideo

    # ---- v2 publish-back loop ----
    # The manifest carries video_key (where to put the video in MinIO) and
    # callback_url (the n8n "4. Publish - Newshound" webhook). n8n then posts the
    # video to the edition's enabled channels. Safe no-ops when manifest is absent.
    - name: Upload final video to MinIO for publishing
      if: ${{ success() && inputs.manifest_b64 != '' }}
      shell: pwsh
      run: |
        $m = Get-Content 'manifest.json' -Raw | ConvertFrom-Json
        if ($m.video_key) {
          & "${{ secrets.MINIO_MC_PATH }}\mc" cp animation.mp4 "myminio/${{ secrets.MINIO_BUCKET_NAME }}/$($m.video_key)" --insecure
          Write-Host "Video uploaded to MinIO as $($m.video_key)"
        } else { Write-Host "No video_key in manifest - skipping MinIO upload" }

    - name: Notify n8n render-complete webhook
      if: ${{ success() && inputs.manifest_b64 != '' }}
      shell: pwsh
      env:
        MANIFEST_B64: ${{ inputs.manifest_b64 }}
      run: |
        $m = Get-Content 'manifest.json' -Raw | ConvertFrom-Json
        if ($m.callback_url) {
          $body = @{ status = 'success'; video_key = $m.video_key;
                     run_id = $env:GITHUB_RUN_ID; manifest_b64 = $env:MANIFEST_B64 } | ConvertTo-Json -Compress
          try {
            Invoke-RestMethod -Method Post -Uri $m.callback_url -Body $body -ContentType 'application/json' | Out-Null
            Write-Host "n8n callback OK -> $($m.callback_url)"
          } catch { Write-Host "n8n callback FAILED: $($_.Exception.Message)" }
        } else { Write-Host "No callback_url in manifest - skipping webhook" }
